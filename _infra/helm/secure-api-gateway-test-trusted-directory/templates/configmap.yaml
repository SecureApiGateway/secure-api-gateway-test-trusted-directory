---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
data:
  application.yml: |
    trusted-directory:
      issuer-name: {{ .Values.config.issuerName }}
      fqdn: {{ .Values.config.fqdn }}
      signing:
        keystore-path: {{ .Values.config.signing.keystorePath }}
        keystore-type: {{ .Values.config.signing.keystoreType }}
        key-alias: {{ .Values.config.signing.keystoreAlias }}
        # Passwords are injected at runtime from the Secret via env vars
        keystore-pwd: ${TTD_SIGNING_KEYSTORE_PWD}
        keystore-key-pwd: ${TTD_SIGNING_KEYSTORE_KEY_PWD}
      ca:
        keystore-path: {{ .Values.config.ca.keystorePath }}
        keystore-type: {{ .Values.config.ca.keystoreType }}
        key-alias: {{ .Values.config.ca.keystoreAlias }}
        # Passwords are injected at runtime from the Secret via env vars
        keystore-pwd: ${TTD_CA_KEYSTORE_PWD}
        keystore-key-pwd: ${TTD_CA_KEYSTORE_KEY_PWD}